name: CI

on:
  push:
    branches-ignore:
      - main
  pull_request:
    branches:
      - main

env:
  X_API_BEARER_TOKEN: test
  ANTHROPIC_API_KEY: test
  JWT_SECRET_KEY: test_ci_secret

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: uv sync --all-extras
      - name: Ruff check
        run: uv run ruff check .
      - name: Ruff format
        run: uv run ruff format --check .
      - name: Import linter
        run: uv run lint-imports
      - name: Pyright
        run: uv run pyright
      - name: Tests
        run: uv run pytest

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check if frontend exists
        id: check
        run: |
          if [ -f admin/package.json ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "admin/package.json not found, skipping frontend checks"
          fi
      - uses: oven-sh/setup-bun@v2
        if: steps.check.outputs.exists == 'true'
      - name: Install frontend dependencies
        if: steps.check.outputs.exists == 'true'
        run: cd admin && bun install --frozen-lockfile
      - name: Biome check
        if: steps.check.outputs.exists == 'true'
        run: cd admin && bunx biome check .
      - name: Type check
        if: steps.check.outputs.exists == 'true'
        run: cd admin && bunx vue-tsc --noEmit
      - name: Build
        if: steps.check.outputs.exists == 'true'
        run: cd admin && bun run build

  codegen:
    runs-on: ubuntu-latest
    needs: [backend]
    steps:
      - uses: actions/checkout@v4
      - name: Check if openapi-client exists
        id: check
        run: |
          if [ -f packages/openapi-client/package.json ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "packages/openapi-client/package.json not found, skipping codegen checks"
          fi
      - uses: astral-sh/setup-uv@v7
        if: steps.check.outputs.exists == 'true'
        with:
          python-version: "3.12"
      - uses: oven-sh/setup-bun@v2
        if: steps.check.outputs.exists == 'true'
      - name: Install backend dependencies
        if: steps.check.outputs.exists == 'true'
        run: uv sync --all-extras
      - name: Generate OpenAPI client
        if: steps.check.outputs.exists == 'true'
        run: make gen
      - name: Check generated files are up to date
        if: steps.check.outputs.exists == 'true'
        run: git diff --exit-code || (echo "生成物过期，请本地运行 make gen 并提交" && exit 1)
