name: CI

on:
  push:
    branches-ignore: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: '3.12'
      - run: uv sync --all-extras
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run lint-imports
      - run: uv run pyright
      - run: uv run pytest

  frontend:
    runs-on: ubuntu-latest
    if: ${{ hashFiles('admin/package.json') != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: cd admin && bun install --frozen-lockfile
      - run: cd admin && bunx biome check .
      - run: cd admin && bunx vue-tsc --noEmit
      - run: cd admin && bun run build

  codegen:
    runs-on: ubuntu-latest
    needs: [backend]
    if: ${{ hashFiles('packages/openapi-client/package.json') != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: '3.12'
      - uses: oven-sh/setup-bun@v2
      - run: uv sync --all-extras
      - run: make gen
      - name: Check codegen consistency
        run: git diff --exit-code
