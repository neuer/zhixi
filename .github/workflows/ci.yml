name: CI

on:
  push:
    branches-ignore:
      - main
  pull_request:
    branches:
      - main

env:
  X_API_BEARER_TOKEN: test
  ANTHROPIC_API_KEY: test
  JWT_SECRET_KEY: test_ci_secret

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: uv sync --all-extras
      - name: Ruff check
        run: uv run ruff check .
      - name: Ruff format
        run: uv run ruff format --check .
      - name: Import linter
        run: uv run lint-imports
      - name: Pyright
        run: uv run pyright
      - name: Tests
        run: uv run pytest

  # frontend 和 codegen jobs 在 P2 阶段添加（需要 admin/ 和 packages/ 目录）
